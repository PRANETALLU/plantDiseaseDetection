# Deploy Expo mobile app on push to main
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   EXPO_TOKEN                  - https://expo.dev/accounts/[account]/settings/access-tokens
#   EAS_PROJECT_ID              - from app.config.js after running `eas init`
#   EXPO_PUBLIC_SUPABASE_URL    - Supabase project URL
#   EXPO_PUBLIC_SUPABASE_KEY    - Supabase publishable key
#   EXPO_PUBLIC_API_BASE_URL    - Deployed FastAPI URL (not localhost)

name: Deploy Expo App

on:
  push:
    branches: [main]
    paths:
      - 'client/my-new-project/**'
      - '.github/workflows/deploy-expo.yml'
  workflow_dispatch:

concurrency:
  group: deploy-expo-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: client/my-new-project

env:
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
  EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
  EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
  EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}

jobs:
  build-mobile:
    name: EAS Build (Android APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/my-new-project/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive
